image : python:3.10

stages:
    - code-check
    - testing

before_script:
    - apt update
    - python3.10 -m pip install pylint
    - python3.10 -m pip install pytest
    - ls
    - python3.10 -m pip install -r requirements.txt
    - cd ..

code-analysis:
    stage: code-check
    script :
        - pylint --recursive=y riverapp/src --disable=R0901,W0613,C0114,E0611 --fail-under=6 --class-attribute-naming-style=snake_case


testing:
    stage: testing
    script:
        - cd riverapp
        - python -m pytest tests/riverapp_test/