image : python:3.10

stages:
    - code-check

before_script:
    - apt update
    - python3.10 -m pip install pylint
    - cd ..

code-analysis:
    stage: code-check
    script :
        - pylint --recursive=y riverapp --disable=R0901,W0613,C0114,E0611 --fail-under=3 --class-attribute-naming-style=snake_case
        - python -m pytest tests/riverapp_test/
