image : python:3.10

stages:
    - code-check
    - testing

before_script:
    - apt update
    - python3.10 -m pip install pylint
    - python3.10 -m pip install pytest
    - python3.10 -m pip install -r requirements.txt

code-analysis:
    stage: code-check
    script:
        - pylint --recursive=y src --disable=E0611,E1101  --fail-under=9 --class-attribute-naming-style=snake_case

testing:
    stage: testing
    script:
        - apt install libgl1-mesa-glx libsm6 libxext6 -y
        - echo $PWD
        - python -m pytest --ignore=tests/pyorc_test/